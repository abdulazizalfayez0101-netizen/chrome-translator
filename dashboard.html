<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kingnwaf · Review Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">K</div>
        <span class="brand-name">kingnwaf</span>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-filter="all">
          <span class="nav-icon">📚</span> All Words
        </button>
        <button class="nav-item" data-filter="new">
          <span class="nav-icon">✨</span> New
        </button>
        <button class="nav-item" data-filter="learning">
          <span class="nav-icon">📖</span> Learning
        </button>
        <button class="nav-item" data-filter="review">
          <span class="nav-icon">🔄</span> Review
        </button>
        <button class="nav-item" data-filter="mastered">
          <span class="nav-icon">🏆</span> Mastered
        </button>
      </nav>

      <div class="sidebar-stats">
        <div class="s-stat">
          <span class="s-val" id="ss-total">0</span>
          <span class="s-lbl">Total</span>
        </div>
        <div class="s-stat">
          <span class="s-val" id="ss-mastered">0</span>
          <span class="s-lbl">Mastered</span>
        </div>
        <div class="s-stat">
          <span class="s-val" id="ss-due">0</span>
          <span class="s-lbl">Due</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Topbar -->
      <div class="topbar">
        <h1 class="page-title">Vocabulary</h1>
        <div class="topbar-right">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="Search words..." />
          </div>
        </div>
      </div>

      <!-- Word List -->
      <div class="word-list" id="word-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No words yet</div>
          <div class="empty-desc">Select English text on any page to start building your vocabulary.</div>
        </div>
      </div>

    </main>

  </div>

  <!-- Word Card Template -->
  <template id="word-card-tmpl">
    <div class="word-card">
      <div class="card-top">
        <div class="card-left">
          <div class="card-english"></div>
          <div class="card-arabic"></div>
          <div class="card-meaning"></div>
        </div>
        <div class="card-right">
          <span class="card-badge"></span>
        </div>
      </div>
      <div class="card-meta">
        <span class="card-date"></span>
        <span class="card-source"></span>
      </div>
      <div class="card-context"></div>
      <div class="card-actions">
        <button class="ca-btn ca-new" data-action="new">New</button>
        <button class="ca-btn ca-learning" data-action="learning">Learning</button>
        <button class="ca-btn ca-review" data-action="review">Review</button>
        <button class="ca-btn ca-mastered" data-action="mastered">Mastered</button>
        <button class="ca-btn ca-delete" data-action="delete">Delete</button>
      </div>
    </div>
  </template>

  <script src="dashboard.js"></script>
</body>
</html>
