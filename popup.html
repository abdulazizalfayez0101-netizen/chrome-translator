<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kingnwaf</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="brand-icon">K</div>
        <span class="brand-name">kingnwaf</span>
      </div>
      <label class="toggle" title="Enable / Disable extension">
        <input type="checkbox" id="toggle-enabled" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-known">0</div>
        <div class="stat-label">WORDS KNOWN</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-mastered">0</div>
        <div class="stat-label">MASTERED</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-due">0</div>
        <div class="stat-label">CARDS DUE</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">TOTAL CARDS</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Options -->
    <div class="options">
      <div class="option-row">
        <div class="option-info">
          <span class="option-label">Word Coloring</span>
          <span class="option-desc">Highlight saved words on pages</span>
        </div>
        <label class="toggle sm">
          <input type="checkbox" id="toggle-coloring" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="option-row">
        <div class="option-info">
          <span class="option-label">Force All Text</span>
          <span class="option-desc">Highlight across all visible text</span>
        </div>
        <label class="toggle sm">
          <input type="checkbox" id="toggle-force" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Reminder Setting -->
    <div class="divider"></div>
    <div class="reminder-section">
      <div class="option-label">Reminder Interval</div>
      <select id="reminder-select">
        <option value="0">Disabled</option>
        <option value="15">Every 15 minutes</option>
        <option value="30">Every 30 minutes</option>
        <option value="60">Every 1 hour</option>
      </select>
    </div>

    <!-- Dashboard Link -->
    <div class="divider"></div>
    <button class="dashboard-btn" id="btn-dashboard">
      Open Review Dashboard
      <span class="arrow">→</span>
    </button>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-hint">Alt+S for OCR capture</span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
